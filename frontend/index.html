<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Notes</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>📚 Student Notes</h1>

        <div class="form">

            <input
                type="text"
                id="title"
                placeholder="Title">

            <textarea
                id="note"
                placeholder="Write your note..."></textarea>

            <button id="addBtn">

                Add Note

            </button>

        </div>

        <hr>

        <div id="notes">

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
